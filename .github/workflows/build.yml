name: Build and Release XMLIVE Plugin

on:
  #push:
  #  branches: [ "main" ]
  #  tags:
  #    - 'v*'          # 也支持通过推送 tag 触发，方便手动发版
  workflow_dispatch:   # 允许手动触发

permissions:
  contents: write      # 授予写入内容权限，以便创建 Release

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Java 21 环境
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. 配置 Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. 获取当前版本号
      - name: Get plugin version
        id: get_version
        run: |
          VERSION=$(gradlew printVersion --quiet)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Plugin version: $VERSION"

      # 5. 使用 Gradle 构建插件
      - name: Build with Gradle
        run: gradlew clean build

      # 6. 创建 Release 并上传构建产物
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: XMLIVE v${{ steps.get_version.outputs.VERSION }}
          body: |
            🎉 自动构建版本 v${{ steps.get_version.outputs.VERSION }}
            
            ### 📦 下载
            - 点击下方 **XMLIVE-${{ steps.get_version.outputs.VERSION }}.jar** 下载插件。
            
            ### 🛠️ 更新内容
            - 请参考 [提交历史](https://github.com/${{ github.repository }}/commits/main)
          files: build/libs/*.jar
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
