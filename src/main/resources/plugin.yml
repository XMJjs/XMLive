name: XMLIVE
version: ${version}
main: com.xmjjs.xmlive.XMLive
api-version: '1.21'
author: YourName
description: A third-person camera follow system for live streaming.
softdepend: [packetevents]   # 使用正确的全小写名称，且改为软依赖

commands:
  xl:
    description: XMLIVE 主命令
    usage: /<command> <login|bind|unbind|auto|camera|toggle|mode|reset|list|reload>

permissions:
  xmlive.use:
    description: 允许登录并使用个人镜头调整和状态切换
    default: true
  xmlive.admin:
    description: 管理员命令权限
    default: op
