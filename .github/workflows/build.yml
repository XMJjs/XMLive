# .github/workflows/build.yml
name: Build XMLIVE Plugin

# 触发条件：推送到 main 分支时自动构建
on:
  #push:
  #  branches: [ "main" ]
  #pull_request:
  #  branches: [ "main" ]
  workflow_dispatch: # 允许在 Actions 页面手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - uses: actions/checkout@v4

      # 2. 设置 Java 21 环境
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. 配置 Gradle 环境并缓存依赖，加速后续构建
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. 执行 Gradle 构建
      - name: Build with Gradle
        run: gradle build

      # 5. 上传构建好的 JAR 文件作为构建产物
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: XMLIVE-Plugin
          path: build/libs/*.jar
